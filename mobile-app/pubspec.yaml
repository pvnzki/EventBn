name: event_booking_app
description: EventBn - A Flutter-based Event Booking mobile application

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  payhere_mobilesdk_flutter: ^3.0.14

  # HTTP client for API calls
  http: ^1.1.0

  # JSON annotation and serialization
  json_annotation: ^4.8.1

  # Routing
  go_router: ^12.1.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Image handling
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  video_player: ^2.7.0

  # Icons
  cupertino_icons: ^1.0.2

  # Utilities
  intl: ^0.19.0

  # Loading indicators
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0

  # Toast messages
  fluttertoast: ^8.2.4

  # QR Code generation
  qr_flutter: ^4.1.0

  # SVG support
  flutter_svg: ^2.0.9

  # Staggered Grid View for masonry layout
  flutter_staggered_grid_view: ^0.7.0

  # Email validation
  email_validator: ^2.1.17

  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

  # Linting
  flutter_lints: ^3.0.0

  # Icon generation
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/seat_map.json
    - .env

  # Custom fonts - San Francisco (No italic variants)
  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFPRODISPLAYREGULAR.OTF
        - asset: assets/fonts/SFPRODISPLAYMEDIUM.OTF
          weight: 500
        - asset: assets/fonts/SFPRODISPLAYBOLD.OTF
          weight: 700

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/eventbn logo bg black.png"
  min_sdk_android: 21
  remove_alpha_ios: true
