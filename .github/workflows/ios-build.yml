name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "Unique build identifier"
        required: true
        type: string
      flutter_version:
        description: "Flutter version"
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version || '' }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: |
          cd mobile-app
          flutter pub get

      - name: Create .env file
        run: |
          cd mobile-app
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build iOS (device)
        run: |
          cd mobile-app
          flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd mobile-app

          echo "Searching for Runner.app..."
          APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/

          cd build
          zip -r ${{ inputs.build_id }}.ipa Payload
          rm -rf Payload

          echo "IPA created successfully"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile-app/build/*.ipa
          retention-days: 7

      - name: Build Summary
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID:** ${{ inputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type:** Unsigned IPA (install via AltStore/Sideloadly)" >> $GITHUB_STEP_SUMMARY