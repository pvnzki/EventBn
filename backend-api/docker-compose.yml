services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - eventbn-net

  eventbn-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: eventbn-rabbitmq
    ports:
      - "8672:5672"      # AMQP port (using 8672 to avoid Windows restrictions)
      - "18672:15672"    # Management UI port (using 18672)
    environment:
      RABBITMQ_DEFAULT_USER: eventbn
      RABBITMQ_DEFAULT_PASS: eventbn123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - eventbn-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  core-service:
    build: ./services/core-service
    container_name: core-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/core-service/.env
    depends_on:
      redis:
        condition: service_started
      eventbn-rabbitmq:
        condition: service_healthy
    networks:
      - eventbn-net

  post-service:
    build: ./services/post-service
    container_name: post-service
    ports:
      - "3002:3002"
    env_file:
      - ./services/post-service/.env
    depends_on:
      core-service:
        condition: service_started
      eventbn-rabbitmq:
        condition: service_healthy
    networks:
      - eventbn-net

  # Temporarily commented out web-admin due to missing UI components
  # web-admin:
  #   build: ../web
  #   container_name: web-admin
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - core-service
  #   networks:
  #     - eventbn-net

volumes:
  redis_data:
  rabbitmq_data:

networks:
  eventbn-net:    
    driver: bridge
